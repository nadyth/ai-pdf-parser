services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pdf
      POSTGRES_PASSWORD: pdf
      POSTGRES_DB: pdfparser
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdf -d pdfparser"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pdf:pdf@postgres:5432/pdfparser
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage:/data/storage
    ports:
      - "8000:8000"

  worker:
    build: .
    command: ["arq", "app.tasks.worker.WorkerSettings"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pdf:pdf@postgres:5432/pdfparser
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage:/data/storage

volumes:
  pgdata:
  storage:
