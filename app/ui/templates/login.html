<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Log in — PDF Parser</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="auth">
  <form method="post" action="/ui/login" class="auth-form">
    <h1>PDF Parser</h1>
    <p>Enter an API key to continue.</p>
    <input name="api_key" type="password" placeholder="API key" autofocus required />
    {% if request.query_params.get("error") %}<p class="error">Invalid key.</p>{% endif %}
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
