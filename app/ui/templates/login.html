<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Log in — PDF Parser</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="auth">
  <form method="post" action="/ui/login" class="auth-form">
    <h1>PDF Parser</h1>
    <p>Sign in to continue.</p>
    <input name="email" type="email" placeholder="Email address" autofocus required />
    <input name="password" type="password" placeholder="Password" required />
    {% if request.query_params.get("error") %}<p class="error">Invalid email or password.</p>{% endif %}
    <button type="submit">Sign in</button>
    <p class="auth-link"><a href="/ui/signup">Create an account</a></p>
  </form>
</body>
</html>
