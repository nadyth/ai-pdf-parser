services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pdf
      POSTGRES_PASSWORD: pdf
      POSTGRES_DB: pdfparser
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdf -d pdfparser"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pdf:pdf@postgres:5432/pdfparser
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pdf:pdf@postgres:5432/pdfparser
      REDIS_URL: redis://redis:6379/0
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/sa-key.json
      # GCS_BUCKET, GCS_PROJECT, and GCS_PATH_PREFIX are read from .env
    volumes:
      - ${GCS_SA_KEY_PATH}:/secrets/sa-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8000}:8000"

  worker:
    build: .
    command: ["arq", "app.tasks.worker.WorkerSettings"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pdf:pdf@postgres:5432/pdfparser
      REDIS_URL: redis://redis:6379/0
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/sa-key.json
      # GCS_BUCKET, GCS_PROJECT, and GCS_PATH_PREFIX are read from .env
    volumes:
      - ${GCS_SA_KEY_PATH}:/secrets/sa-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
