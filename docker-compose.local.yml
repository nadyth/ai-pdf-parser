services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pdf
      POSTGRES_PASSWORD: pdf
      POSTGRES_DB: pdfparser
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdf -d pdfparser"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-public-host", "fake-gcs:4443"]
    ports:
      - "4443:4443"

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pdf:pdf@postgres:5432/pdfparser
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pdf:pdf@postgres:5432/pdfparser
      REDIS_URL: redis://redis:6379/0
      STORAGE_EMULATOR_HOST: http://fake-gcs:4443
      GCS_BUCKET: pdf-parser
      GCS_PROJECT: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      fake-gcs:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build: .
    command: ["arq", "app.tasks.worker.WorkerSettings"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pdf:pdf@postgres:5432/pdfparser
      REDIS_URL: redis://redis:6379/0
      STORAGE_EMULATOR_HOST: http://fake-gcs:4443
      GCS_BUCKET: pdf-parser
      GCS_PROJECT: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      fake-gcs:
        condition: service_started

volumes:
  pgdata:
